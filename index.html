<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇小游戏</title>
  <style>
    :root {
      --bg: linear-gradient(180deg, #f6f1de 0%, #f1d8a4 100%);
      --panel: rgba(255, 250, 240, 0.88);
      --panel-border: rgba(103, 74, 34, 0.18);
      --text: #3b2b1b;
      --muted: #7d6750;
      --accent: #d55d3f;
      --accent-dark: #a74127;
      --snake: #2f7d4b;
      --snake-head: #1d5d36;
      --food: #d84747;
      --cell: rgba(255, 255, 255, 0.55);
      --cell-border: rgba(94, 67, 33, 0.08);
      --shadow: 0 18px 45px rgba(74, 46, 12, 0.18);
      --grid-size: min(82vw, 520px);
      --cols: 18;
      --rows: 18;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.65), transparent 32%),
        radial-gradient(circle at bottom right, rgba(217, 129, 86, 0.22), transparent 28%),
        var(--bg);
    }

    .shell {
      width: min(100%, 920px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 300px);
      gap: 24px;
      align-items: start;
    }

    .board-panel,
    .side-panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .board-panel {
      padding: 20px;
    }

    .side-panel {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.1;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-card {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(103, 74, 34, 0.12);
    }

    .stat-label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font: inherit;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }

    .primary-btn,
    .secondary-btn {
      padding: 12px 18px;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(112, 61, 31, 0.15);
    }

    .primary-btn {
      background: var(--accent);
      color: #fffaf5;
    }

    .primary-btn:hover {
      background: var(--accent-dark);
    }

    .secondary-btn {
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
    }

    .status {
      min-height: 46px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(103, 74, 34, 0.12);
      color: var(--muted);
      line-height: 1.5;
    }

    .status.game-over {
      color: #8b2e1d;
      background: rgba(255, 233, 226, 0.92);
      border-color: rgba(181, 73, 46, 0.2);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(var(--cols), 1fr);
      gap: 4px;
      width: 100%;
      aspect-ratio: 1;
      padding: 8px;
      border-radius: 24px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.65), rgba(255, 242, 222, 0.82)),
        #fff7ea;
      border: 1px solid rgba(103, 74, 34, 0.1);
    }

    .cell {
      border-radius: 8px;
      background: var(--cell);
      border: 1px solid var(--cell-border);
      transition: background 100ms ease, transform 100ms ease;
    }

    .cell.snake {
      background: var(--snake);
    }

    .cell.head {
      background: var(--snake-head);
      transform: scale(1.03);
    }

    .cell.food {
      background: var(--food);
      transform: scale(1.18);
      box-shadow: inset 0 0 0 2px rgba(255, 239, 237, 0.55);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 68px);
      grid-template-rows: repeat(3, 68px);
      justify-content: center;
      gap: 10px;
      align-self: center;
    }

    .control-btn {
      width: 68px;
      height: 68px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
      font-size: 28px;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(112, 61, 31, 0.12);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .control-btn[data-direction="up"] {
      grid-column: 2;
      grid-row: 1;
    }

    .control-btn[data-direction="left"] {
      grid-column: 1;
      grid-row: 2;
    }

    .control-btn[data-direction="right"] {
      grid-column: 3;
      grid-row: 2;
    }

    .control-btn[data-direction="down"] {
      grid-column: 2;
      grid-row: 3;
    }

    .hint {
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
    }

    @media (max-width: 820px) {
      body {
        padding: 16px;
      }

      .shell {
        grid-template-columns: 1fr;
      }

      .board-panel {
        padding: 16px;
      }

      .side-panel {
        padding: 18px;
      }
    }

    @media (max-width: 480px) {
      .stats {
        grid-template-columns: 1fr;
      }

      .controls {
        grid-template-columns: repeat(3, 60px);
        grid-template-rows: repeat(3, 60px);
      }

      .control-btn {
        width: 60px;
        height: 60px;
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="board-panel">
      <div id="board" class="board" aria-label="贪吃蛇游戏区域"></div>
    </section>

    <aside class="side-panel">
      <div>
        <h1>贪吃蛇</h1>
        <p class="subtitle">键盘方向键 / WASD 或屏幕按钮都能控制。吃到红色食物加分，别撞墙也别撞到自己。</p>
      </div>

      <div class="stats">
        <div class="stat-card">
          <span class="stat-label">当前分数</span>
          <strong id="score" class="stat-value">0</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">当前关卡</span>
          <strong id="level" class="stat-value">1</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">升级还差</span>
          <strong id="goal" class="stat-value">8</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">最高分</span>
          <strong id="best-score" class="stat-value">0</strong>
        </div>
      </div>

      <div class="actions">
        <button id="start-btn" class="primary-btn" type="button">开始游戏</button>
        <button id="restart-btn" class="secondary-btn" type="button">重新开始</button>
      </div>

      <div id="status" class="status">按“开始游戏”后开始移动。第一次游玩也可以直接按方向键启动。</div>

      <div class="controls" aria-label="方向控制按钮">
        <button class="control-btn" type="button" data-direction="up" aria-label="向上">↑</button>
        <button class="control-btn" type="button" data-direction="left" aria-label="向左">←</button>
        <button class="control-btn" type="button" data-direction="right" aria-label="向右">→</button>
        <button class="control-btn" type="button" data-direction="down" aria-label="向下">↓</button>
      </div>

      <p class="hint">小提示：一共 20 关，前 10 关每关吃 8 个升级，11-20 关每关吃 10 个升级，不能立刻反向掉头。</p>
    </aside>
  </main>

  <script>
    (function () {
      const rows = 18;
      const cols = 18;
      const totalLevels = 20;
      const levelGoals = Array.from({ length: totalLevels }, (_, index) => index < 10 ? 8 : 10);
      const baseTickMs = 240;
      const minTickMs = 70;
      const tickStepMs = Math.floor((baseTickMs - minTickMs) / (totalLevels - 1));
      const bestScoreKey = "snake-best-score";
      const board = document.getElementById("board");
      const scoreEl = document.getElementById("score");
      const levelEl = document.getElementById("level");
      const goalEl = document.getElementById("goal");
      const bestScoreEl = document.getElementById("best-score");
      const statusEl = document.getElementById("status");
      const startBtn = document.getElementById("start-btn");
      const restartBtn = document.getElementById("restart-btn");
      const controlButtons = Array.from(document.querySelectorAll(".control-btn"));

      const directionMap = {
        ArrowUp: "up",
        KeyW: "up",
        ArrowDown: "down",
        KeyS: "down",
        ArrowLeft: "left",
        KeyA: "left",
        ArrowRight: "right",
        KeyD: "right"
      };

      const deltaMap = {
        up: { row: -1, col: 0 },
        down: { row: 1, col: 0 },
        left: { row: 0, col: -1 },
        right: { row: 0, col: 1 }
      };

      const oppositeMap = {
        up: "down",
        down: "up",
        left: "right",
        right: "left"
      };

      const cells = [];
      let snake = [];
      let food = null;
      let direction = "right";
      let nextDirection = "right";
      let score = 0;
      let level = 1;
      let levelScore = 0;
      let bestScore = readBestScore();
      let timerId = null;
      let gameStarted = false;
      let gameOver = false;

      function currentTickMs() {
        return Math.max(minTickMs, baseTickMs - (level - 1) * tickStepMs);
      }

      function currentGoal() {
        return levelGoals[level - 1] || levelGoals[levelGoals.length - 1];
      }

      function readBestScore() {
        try {
          return Number.parseInt(localStorage.getItem(bestScoreKey) || "0", 10) || 0;
        } catch (error) {
          return 0;
        }
      }

      function saveBestScore(value) {
        try {
          localStorage.setItem(bestScoreKey, String(value));
        } catch (error) {
          return;
        }
      }

      function buildBoard() {
        const fragment = document.createDocumentFragment();

        for (let index = 0; index < rows * cols; index += 1) {
          const cell = document.createElement("div");
          cell.className = "cell";
          fragment.appendChild(cell);
          cells.push(cell);
        }

        board.appendChild(fragment);
      }

      function indexFromPoint(point) {
        return point.row * cols + point.col;
      }

      function resetState() {
        snake = [
          { row: 8, col: 7 },
          { row: 8, col: 8 },
          { row: 8, col: 9 }
        ];
        direction = "right";
        nextDirection = "right";
        score = 0;
        level = 1;
        levelScore = 0;
        food = spawnFood();
        gameStarted = false;
        gameOver = false;
        stopLoop();
        updateScore();
        setStatus("按“开始游戏”后开始移动。前 10 关吃 8 个升级，后 10 关吃 10 个升级。");
        render();
      }

      function spawnFood() {
        const occupied = new Set(snake.map(indexFromPoint));
        const openSlots = [];

        for (let row = 0; row < rows; row += 1) {
          for (let col = 0; col < cols; col += 1) {
            const point = { row, col };
            if (!occupied.has(indexFromPoint(point))) {
              openSlots.push(point);
            }
          }
        }

        if (openSlots.length === 0) {
          return null;
        }

        const randomIndex = Math.floor(Math.random() * openSlots.length);
        return openSlots[randomIndex];
      }

      function updateScore() {
        scoreEl.textContent = String(score);
        levelEl.textContent = String(level);
        goalEl.textContent = gameOver && level === totalLevels && levelScore >= currentGoal()
          ? "完成"
          : String(Math.max(0, currentGoal() - levelScore));
        bestScoreEl.textContent = String(bestScore);
      }

      function setStatus(message, ended) {
        statusEl.textContent = message;
        statusEl.classList.toggle("game-over", Boolean(ended));
      }

      function render() {
        cells.forEach((cell) => {
          cell.className = "cell";
        });

        snake.forEach((segment, index) => {
          const cell = cells[indexFromPoint(segment)];
          if (!cell) {
            return;
          }
          cell.classList.add("snake");
          if (index === snake.length - 1) {
            cell.classList.add("head");
          }
        });

        if (food) {
          const foodCell = cells[indexFromPoint(food)];
          if (foodCell) {
            foodCell.classList.add("food");
          }
        }
      }

      function startLoop() {
        if (timerId || gameOver) {
          return;
        }
        timerId = window.setInterval(step, currentTickMs());
        gameStarted = true;
        setStatus("第 " + level + " 关开始，继续吃食物吧。");
      }

      function stopLoop() {
        if (!timerId) {
          return;
        }
        window.clearInterval(timerId);
        timerId = null;
      }

      function handleDirectionInput(newDirection) {
        if (!newDirection) {
          return;
        }

        const blockedByCurrent = oppositeMap[direction] === newDirection;
        const blockedByQueued = oppositeMap[nextDirection] === newDirection;

        if (blockedByCurrent || blockedByQueued) {
          return;
        }

        nextDirection = newDirection;

        if (!gameStarted && !gameOver) {
          startLoop();
        }
      }

      function finishGame(message) {
        gameOver = true;
        gameStarted = false;
        stopLoop();
        setStatus(message, true);
      }

      function restartLoopWithNewSpeed() {
        if (!gameStarted || gameOver) {
          return;
        }

        stopLoop();
        timerId = window.setInterval(step, currentTickMs());
      }

      function advanceLevel() {
        if (level >= totalLevels) {
          return false;
        }

        level += 1;
        levelScore = 0;
        updateScore();
        restartLoopWithNewSpeed();
        setStatus("进入第 " + level + " 关，速度提升了，继续加油。");
        return true;
      }

      function step() {
        direction = nextDirection;
        const delta = deltaMap[direction];
        const head = snake[snake.length - 1];
        const newHead = {
          row: head.row + delta.row,
          col: head.col + delta.col
        };

        const hitsWall =
          newHead.row < 0 ||
          newHead.row >= rows ||
          newHead.col < 0 ||
          newHead.col >= cols;

        if (hitsWall) {
          finishGame("撞墙了，游戏结束。点“重新开始”再来一局。");
          return;
        }

        const willEatFood = food && newHead.row === food.row && newHead.col === food.col;
        const nextSnake = willEatFood ? snake.slice() : snake.slice(1);
        const hitsSelf = nextSnake.some((segment) => segment.row === newHead.row && segment.col === newHead.col);

        if (hitsSelf) {
          finishGame("撞到自己了，游戏结束。点“重新开始”继续挑战。");
          return;
        }

        if (!willEatFood) {
          snake.shift();
        }

        snake.push(newHead);

        if (willEatFood) {
          score += 1;
          levelScore += 1;
          if (score > bestScore) {
            bestScore = score;
            saveBestScore(bestScore);
          }
          food = spawnFood();

          if (!food) {
            finishGame("你把地图填满了，恭喜通关。");
            updateScore();
            render();
            return;
          }

          if (level < totalLevels && levelScore >= currentGoal()) {
            advanceLevel();
          } else if (level === totalLevels && levelScore >= currentGoal()) {
            updateScore();
            render();
            finishGame("20 关全部完成，恭喜通关。");
            return;
          } else {
            setStatus("吃到了！继续保持节奏。");
            updateScore();
          }
        }

        if (!willEatFood) {
          updateScore();
        }

        render();
      }

      document.addEventListener("keydown", (event) => {
        const newDirection = directionMap[event.code];
        if (!newDirection) {
          return;
        }
        event.preventDefault();

        if (gameOver && event.code === "Space") {
          resetState();
          startLoop();
          return;
        }

        handleDirectionInput(newDirection);
      });

      startBtn.addEventListener("click", () => {
        if (gameOver) {
          resetState();
        }
        startLoop();
      });

      restartBtn.addEventListener("click", () => {
        resetState();
      });

      controlButtons.forEach((button) => {
        button.addEventListener("click", () => {
          handleDirectionInput(button.dataset.direction);
        });
      });

      buildBoard();
      updateScore();
      render();
      resetState();
    }());
  </script>
</body>
</html>
